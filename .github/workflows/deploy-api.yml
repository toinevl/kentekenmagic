name: Deploy API to Azure Functions

# Standalone Azure Functions deployment (Node 24, Functions v4, Linux Consumption).
# The frontend deploys separately to Azure Static Web Apps (deploy.yml) and calls
# this Function App's URL directly. SWA managed functions were abandoned because
# the v4 model could not be deployed there (Node 20 EOL / managed-functions limits).

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  FUNCTIONAPP_NAME: kentekenmagic-api

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install workspace deps & build API
        run: |
          npm ci
          npm run build --workspace api

      - name: Stage self-contained function package
        # skip Oryx/SCM remote build: ship prebuilt dist + production node_modules.
        # In an npm-workspaces monorepo, api/node_modules is empty (deps hoist to
        # the repo root), so install the API's prod deps standalone (--no-workspaces).
        run: |
          rm -rf api-deploy
          mkdir -p api-deploy
          cp -r api/dist api-deploy/dist
          cp api/host.json api/package.json api-deploy/
          cd api-deploy
          npm install --omit=dev --no-package-lock --no-workspaces

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTIONAPP_NAME }}
          package: api-deploy
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
