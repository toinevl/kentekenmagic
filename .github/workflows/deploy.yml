name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace api

      # skip_api_build bypasses Oryx, so Azure does NOT run npm install on the
      # API. In an npm-workspaces monorepo, api/node_modules is empty (deps are
      # hoisted to the repo-root node_modules), so the deployed function app
      # would ship without @azure/functions etc. and fail to start. Install the
      # API's production deps directly into api/node_modules as a self-contained
      # package. --no-workspaces makes npm treat api/ as a standalone project.
      - name: Install API production dependencies
        working-directory: api
        run: npm install --omit=dev --no-workspaces --no-package-lock

      - name: Build frontend
        run: npm run build --workspace frontend
        env:
          NEXT_BUILD_EXPORT: "1"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/out"
          api_location: "api"
          skip_app_build: true
          # NOTE: do NOT set skip_api_build — Oryx's API build is what supplies
          # the function "language info" to SWA. Skipping it causes
          # "Function language info isn't provided" on deploy. With node:24
          # (node:20 is EOL) and extensionBundle/core-tools removed, the Oryx
          # API build succeeds.
