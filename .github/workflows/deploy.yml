name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace frontend
        env:
          NEXT_BUILD_EXPORT: "1"
          NEXT_TELEMETRY_DISABLED: "1"
          # The API is a standalone Flex Consumption Function App (deploy-api.yml),
          # NOT SWA managed functions — those could not be deployed on this
          # account/platform (opaque "Failed to deploy the Azure Functions" even
          # with fully correct config). The static frontend calls the Function App
          # directly via CORS; this URL is inlined into the bundle at build time.
          NEXT_PUBLIC_API_BASE_URL: "https://kentekenmagic-api.azurewebsites.net"

      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/out"
          # api_location intentionally empty: no SWA managed functions. The API is
          # deployed separately to a Flex Consumption Function App (deploy-api.yml).
          api_location: ""
          skip_app_build: true
